    <header>
        <h1>Soyeon Park</h1>

    <main>
        <section id="contact">
            <h2><img src="images/pixel-ditto.png" alt="pixel ditto"> Contact Me</h2>
            <img src="images/ditto.png" alt="Ditto waving hello" id="contact-ditto">

            <div class="contact-form-box">
                <form>
                    <div>
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" placeholder="Your name">
                    </div>
                    <div>
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="your@email.com">
                    </div>
                    <div>
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="5"
                            placeholder="Write your message here..."></textarea>
                    </div>
                    <button type="submit">Send</button>
                </form>
            </div>

            <div class="contact-info">
                <p>📧 <a href="mailto:ck310@seoultech.ac.kr">ck310@seoultech.ac.kr</a></p>
                <p>📞 010-1234-1234</p>
                <p>🐱 <a href="https://github.com/so-yeon-333" target="_blank">github.com/so-yeon-333</a></p>
            </div>


        </section>
    </main>
